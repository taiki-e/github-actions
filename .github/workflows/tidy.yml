# Run various checks.
#
# There is no stability guarantee for this workflow, since it's supposed to only be
# used in infra managed by us.
#
# Usage:
#
# ```yaml
#   tidy:
#     uses: taiki-e/github-actions/.github/workflows/tidy.yml@main
#     permissions:
#       security-events: write # for github/codeql-action/*
# ```
#
# See "on.workflow_call.inputs" below for input options.

permissions: {}

on:
  workflow_call:
    inputs:
      rust:
        required: false
        type: string
        default: nightly
      # clippy-specific
      clippy:
        required: false
        type: boolean
        default: true
      clippy-target:
        required: false
        type: string
      clippy-args:
        required: false
        type: string
      clippy-doctest:
        required: false
        type: boolean
        default: true
      unqualified_local_imports:
        required: false
        type: boolean
        default: true
      implicit_provenance_casts:
        required: false
        type: boolean
        default: true
      # cargo-check-external-types-specific
      check-external-types:
        required: false
        type: boolean
        default: true
      check-external-types-rust:
        required: false
        type: string
        # NB: Sync with rust-check-external-types.yml
        default: nightly-2026-06-12
      check-external-types-target:
        required: false
        type: string
      check-external-types-args:
        required: false
        type: string
      # cargo-deny-specific
      deny:
        required: false
        type: boolean
        default: true
      deny-args:
        required: false
        type: string
      # rustdoc-specific
      docs:
        required: false
        type: boolean
        default: true
      docs-target:
        required: false
        type: string
      docs-args:
        required: false
        type: string
      # CodeQL-specific
      codeql:
        required: false
        type: boolean
        default: true
      # codegen-specific
      codegen:
        required: false
        type: boolean
        default: true
      codegen-free-device-space:
        required: false
        type: boolean
        default: false
      # repo checks
      ruleset:
        required: false
        type: boolean
        default: true
      immutable-release:
        required: false
        type: boolean
        default: true

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_GIT_FETCH_WITH_CLI: true
  CARGO_NET_RETRY: 10
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: -D warnings
  RUSTDOCFLAGS: -D warnings
  RUSTUP_MAX_RETRIES: 10
  # Reusable workflows cannot inherit environment variables.
  ATOMIC_MAYBE_UNINIT_DENY_WARNINGS: 1
  CARGO_HACK_DENY_WARNINGS: 1
  CARGO_LLVM_COV_DENY_WARNINGS: 1
  CARGO_MINIMAL_VERSIONS_DENY_WARNINGS: 1
  CARGO_NO_DEV_DEPS_DENY_WARNINGS: 1
  CONST_FN_DENY_WARNINGS: 1
  PORTABLE_ATOMIC_DENY_WARNINGS: 1
  SEMIHOSTING_DENY_WARNINGS: 1

defaults:
  run:
    shell: bash --noprofile --norc -CeEuo pipefail {0}

jobs:
  prepare:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2
      - name: Prepare
        id: prepare
        run: |
          IFS=$'\n\t'
          trap -- 's=$?; printf >&2 "%s\n" "${0##*/}:${LINENO}: \`${BASH_COMMAND}\` exit with ${s}"; exit ${s}' ERR
          retry() {
            for i in {1..10}; do
              if "$@"; then
                return 0
              else
                sleep "${i}"
              fi
            done
            "$@"
          }
          # Note: install python yq when doing check other than non-null check.
          if [[ -n "$(git ls-files '*.rs')" ]]; then
            printf 'rust=true\n' >>"${GITHUB_OUTPUT}"
            metadata=$(cargo metadata --format-version=1 --no-deps)
            # Publishing is unrestricted if null, and forbidden if an empty array.
            if [[ -n "$(jq -c '. as $metadata | .workspace_members[] as $id | $metadata.packages[] | select(.id == $id and .publish != [])' <<<"${metadata}")" ]]; then
              printf 'rust-pub=true\n' >>"${GITHUB_OUTPUT}"
              if [[ -n "$(jq -c '. as $metadata | .workspace_members[] as $id | $metadata.packages[] | select(.id == $id and .publish != [] and .targets[].kind[] == "lib")' <<<"${metadata}")" ]]; then
                printf 'rust-pub-lib=true\n' >>"${GITHUB_OUTPUT}"
              fi
              if [[ -n "$(jq -c '. as $metadata | .workspace_members[] as $id | $metadata.packages[] | select(.id == $id and .publish != [] and .targets[].kind[] == "proc-macro")' <<<"${metadata}")" ]]; then
                printf 'rust-pub-proc-macro=true\n' >>"${GITHUB_OUTPUT}"
              fi
            fi
          fi
          if [[ -n "$(git ls-files '*Dockerfile*')" ]]; then
            printf 'dockerfile=true\n' >>"${GITHUB_OUTPUT}"
          fi
          if [[ -e tools/gen.sh ]]; then
            job=$(yq -c '.jobs.codegen' .github/workflows/ci.yml)
            if [[ "${job}" == "null" ]]; then
              if [[ -e tools/ci/gen.sh ]]; then
                printf '::error::tools/ci/gen.sh is available but codegen job is not available in .github/workflows/ci.yml\n'
                exit 1
              else
                printf 'codegen=true\n' >>"${GITHUB_OUTPUT}"
              fi
            fi
          elif [[ -e tools/ci/gen.sh ]]; then
            printf '::error::tools/ci/gen.sh is available but tools/gen.sh is not available\n'
            exit 1
          fi
          json='{"language":"actions","build-mode":"none"}'
          # https://docs.github.com/en/enterprise-cloud@latest/code-security/how-tos/scan-code-for-vulnerabilities/configure-code-scanning/customizing-your-advanced-setup-for-code-scanning#changing-the-languages-that-are-analyzed
          # https://codeql.github.com/docs/codeql-overview/supported-languages-and-frameworks/
          if [[ -n "$(git ls-files '*.cpp' '*.c++' '*.cxx' '*.hpp' '*.hh' '*.h++' '*.hxx' '*.c' '*.cc' '*.h')" ]]; then
            json+=,'{"language":"c-cpp","build-mode":"none"}'
          fi
          if [[ -n "$(git ls-files '*.cs')" ]]; then
            json+=,'{"language":"csharp","build-mode":"none"}'
          fi
          if [[ -n "$(git ls-files '*.go')" ]]; then
            json+=,'{"language":"go","build-mode":"none"}'
          fi
          if [[ -n "$(git ls-files '*.java' '*.kt')" ]]; then
            json+=,'{"language":"java-kotlin","build-mode":"none"}'
          fi
          if [[ -n "$(git ls-files '*.js' '*.jsx' '*.mjs' '*.es' '*.es6' '*.htm' '*.html' '*.xhtm' '*.xhtml' '*.ejs' '*.ts' '*.tsx' '*.mts' '*.cts')" ]]; then
            json+=,'{"language":"javascript-typescript","build-mode":"none"}'
          fi
          if [[ -n "$(git ls-files '*.py')" ]]; then
            json+=,'{"language":"python","build-mode":"none"}'
          fi
          if [[ -n "$(git ls-files '*.rb')" ]]; then
            json+=,'{"language":"ruby","build-mode":"none"}'
          fi
          if [[ -n "$(git ls-files '*.rs')" ]]; then
            json+=,'{"language":"rust","build-mode":"none"}'
          fi
          if [[ -n "$(git ls-files '*.swift')" ]]; then
            json+=,'{"language":"swift","build-mode":"none"}'
          fi
          printf 'codeql-matrix=%s\n' '{"include":['"${json}"']}' >>"${GITHUB_OUTPUT}"
        env:
          INPUT_RUST: ${{ inputs.rust }}
    outputs:
      rust: ${{ steps.prepare.outputs.rust }}
      rust-pub: ${{ steps.prepare.outputs.rust-pub }}
      rust-pub-lib: ${{ steps.prepare.outputs.rust-pub-lib }}
      rust-pub-proc-macro: ${{ steps.prepare.outputs.rust-pub-proc-macro }}
      dockerfile: ${{ steps.prepare.outputs.dockerfile }}
      codeql-matrix: ${{ steps.prepare.outputs.codeql-matrix }}
      codegen: ${{ steps.prepare.outputs.codegen }}

  tidy:
    needs: prepare
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2
      - uses: taiki-e/install-action@b8cecb83565409bcc297b2df6e77f030b2a468d5 # v2.82.0
        with:
          # cargo-hack is a workaround for https://github.com/EmbarkStudios/cargo-deny/issues/413
          tool: rust@${{ inputs.rust }},cargo-deny,cargo-hack
          fallback: none
        if: inputs.deny && needs.prepare.outputs.rust-pub == 'true'
      - run: cat -- tools/.tidy-check-license-headers
      - run: cat -- .cspell.json
      - run: tools/tidy.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # TODO: move to tools/tidy.sh?
      - name: Run cargo-deny
        run: |
          args=(--workspace --all-features)
          if [[ -n "${INPUT_ARGS}" ]]; then
            while IFS= read -rd' '; do
              [[ -z "${REPLY}" ]] || args+=("${REPLY}")
            done <<<"${INPUT_ARGS//[$'\r\n\t']/ } " # Normalize whitespace characters into space.
          fi
          (
            set -x
            cargo hack --workspace-behavior=cargo --no-private --no-dev-deps deny "${args[@]}" check
          )
        env:
          INPUT_ARGS: ${{ inputs.deny-args }}
        if: inputs.deny && needs.prepare.outputs.rust-pub == 'true'
      - name: Check ruleset
        id: ruleset
        run: |
          set +x
          IFS=$'\n\t'
          bail() {
            printf '::error::%s\n' "$*"
            exit 1
          }
          ruleset=$(gh ruleset list)
          check() {
            local name="$1"
            shift
            local min_rules="$1"
            shift
            local output="$1"
            shift
            local rule_id
            rule_id=$(grep -E "${name}"'\b.*\bactive\b.*\b(['"${min_rules}"'-9]|[1-9][0-9])' <<<"${ruleset}" | cut -d$'\t' -f1)
            printf '%s=%s\n' "${output}" "${rule_id}" >>"${GITHUB_OUTPUT}"
            rule=$(gh ruleset view "${rule_id}")
            printf '%s\n' "${rule}"
            for r in "$@"; do
              grep -Eq "${r}" <<<"${rule}" || bail "ruleset check failed for '${name}' (missing '${r}')"
            done
          }
          check 'Additional branch protection for non-admin roles' 4 'branch-additional' \
            '^- code_scanning: ' \
            '^- non_fast_forward$' \
            '^- pull_request: .*\[required_approving_review_count: ([1-9]|[1-9][0-9])\]' \
            '^- pull_request: .*\[dismiss_stale_reviews_on_push: true\]' \
            '^- pull_request: .*\[allowed_merge_methods: \[squash rebase\]\]' \
            '^- required_status_checks: '
          check 'Additional tag protection for non-admin roles' 4 'tag-additional' \
            '^- ref_name: \[exclude: \[\]\] \[include: \[~ALL\]\]' \
            '^- creation$' \
            '^- deletion$' \
            '^- non_fast_forward$' \
            '^- update$'
          check 'Branch protection for all roles' 2 'branch' \
            '^This ruleset cannot be bypassed$' \
            '^- deletion$' \
            '^- non_fast_forward$'
          check 'Tag protection for all roles' 3 'tag' \
            '^This ruleset cannot be bypassed$' \
            '^- deletion$' \
            '^- non_fast_forward$' \
            '^- update$'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: inputs.ruleset && github.event_name == 'schedule'
      - name: Ensure all tags are contained in protected branches
        run: |
          IFS=$'\n\t'
          retry() {
            for i in {1..10}; do
              if "$@"; then
                return 0
              else
                set -x
                sleep "${i}"
              fi
            done
            "$@"
          }
          retry git fetch origin --tags &>/dev/null
          set +x
          tags=$(git tag | sort -Vr)
          if [[ -z "${tags}" ]]; then
            exit 0
          fi
          all_branches=$(git branch -a | grep -F 'remotes/origin/' | { grep -Fv -e '->' || true; } | sed -E 's|^ *remotes/origin/||g')
          protected_branches=()
          while IFS= read -r branch; do
            rule=$(gh ruleset check "${branch}")
            if grep -Fq "${RULE_ID1}" <<<"${rule}" || grep -Fq "${RULE_ID2}" <<<"${rule}"; then
              protected_branches+=("${branch}")
            fi
          done <<<"${all_branches}"
          IFS=' '
          printf 'info: protected branches: %s\n' "${protected_branches[*]}"
          IFS=$'\n\t'
          rate_limit=''
          while IFS= read -r tag; do
            printf 'info: checking %s...\n' "${tag}"
            # Refs: https://github.com/zizmorcore/zizmor/blob/v1.23.1/crates/zizmor/src/audit/impostor_commit.rs
            commit=$(git show refs/tags/"${tag}" --name-only --no-color | grep -E '^commit' | cut -d' ' -f2)
            ok=''
            code=''
            if [[ -z "${rate_limit}" ]]; then
              set +e
              res=$(
                curl --proto '=https' -fsSL \
                  -H @- \
                  -H 'Accept: application/json' \
                  "https://github.com/${GITHUB_REPOSITORY}/branch_commits/${commit}" 2>&1 \
                  <<<"Authorization: Bearer ${GITHUB_TOKEN}"
              )
              code="$?"
              set -e
              set +x
            fi
            if [[ "${code}" == "0" ]]; then
              if [[ -z "${res}" ]]; then
                # TODO: collect all and emit at the last?
                printf '::error::%s\n' "${tag} is not contained in any branches"
                exit 1
              fi
              branches="$(jq -r '.branches[] | .branch' <<<"${res}")"
              if [[ -z "${branches}" ]]; then
                printf '::error::%s\n' "${tag} is not contained in any branches"
                exit 1
              fi
              while IFS= read -r branch; do
                for b in "${protected_branches[@]}"; do
                  if [[ "${branch}" == "${b}" ]]; then
                    ok=1
                    break
                  fi
                done
                if [[ -n "${ok}" ]]; then
                  break
                fi
              done <<<"${branches}"
            else
              if [[ -n "${code}" ]] && [[ "${res}" == *"returned error: 429"* ]]; then
                # branch_commits API hits its rate limit after fetching 100 commits.
                rate_limit=1
              fi
              similar_name_branches=()
              other_branches=()
              for branch in "${protected_branches[@]}"; do
                if [[ "main" == "${branch}" ]] || [[ "${branch#*/}" == *"${tag#*/}"* ]] || [[ "${tag#*/}" == *"${branch#*/}"* ]]; then
                  similar_name_branches+=("${branch}")
                else
                  other_branches+=("${branch}")
                fi
              done
              for branch in "${similar_name_branches[@]}" "${other_branches[@]}"; do
                url="https://api.github.com/repos/${GITHUB_REPOSITORY}/compare/refs/heads/${branch}...${commit}"
                for i in {1..10}; do
                  if [[ "${i}" == '2' ]]; then
                    printf 'info: getting %s\n' "${url}"
                  fi
                  set +e
                  cmp=$(
                    curl --proto '=https' --tlsv1.2 --fail-with-body -sSL \
                      -H @- \
                      -H 'Accept: application/vnd.github+json' \
                      -H 'X-GitHub-Api-Version: 2022-11-28' \
                      "${url}" \
                      <<<"Authorization: Bearer ${GITHUB_TOKEN}"
                  )
                  code="$?"
                  set -e
                  if [[ "${code}" == '0' ]]; then
                    break
                  elif [[ "$(jq -r '.documentation_url' <<<"${cmp}")" != "null" ]] && [[ "$(jq -r '.status' <<<"${cmp}")" == "404" ]]; then
                    break
                  else
                    sleep "${i}"
                  fi
                done
                case "$(jq -r '.status' <<<"${cmp}")" in
                  identical | behind)
                    ok=1
                    break
                    ;;
                esac
              done
            fi
            if [[ -z "${ok}" ]]; then
              printf '::error::%s\n' "${tag} is not contained in any protected branches"
              exit 1
            fi
            printf 'info: done\n'
          done <<<"${tags}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RULE_ID1: ${{ steps.ruleset.outputs.branch-additional }}
          RULE_ID2: ${{ steps.ruleset.outputs.branch }}
        if: inputs.ruleset && github.event_name == 'schedule'
      - name: Ensure all releases are immutable
        run: |
          retry() {
            for i in {1..10}; do
              if "$@"; then
                return 0
              else
                sleep "${i}"
              fi
            done
            "$@"
          }
          set +x
          page=1
          not_immutable=''
          while true; do
            releases=$(
              retry curl --proto '=https' --tlsv1.2 -fsSL --retry 10 \
                -H @- \
                -H 'Accept: application/vnd.github+json' \
                -H 'X-GitHub-Api-Version: 2022-11-28' \
                "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases?per_page=100&page=${page}" \
                <<<"Authorization: Bearer ${GITHUB_TOKEN}"
            )
            t=$(jq -r '.[] | select(.immutable == false and .draft == false) | .tag_name' <<<"${releases}")
            if [[ -n "${t}" ]]; then
              not_immutable+="${t}"$'\n'
            fi
            len=$(jq '. | length' <<<"${releases}")
            if [[ "${len}" -lt 100 ]]; then
              break
            fi
            _=$((page++))
          done
          if [[ -n "${not_immutable}" ]]; then
            printf '::error::non-immutable releases found\n'
            LC_ALL=C sort -Vr <<<"${not_immutable}"
            exit 1
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: inputs.immutable-release && github.event_name == 'schedule'
      - run: git add -N . && git -c color.ui=always diff --exit-code

  check-external-types:
    needs: prepare
    if: inputs.check-external-types && needs.prepare.outputs.rust-pub-lib == 'true'
    uses: ./.github/workflows/rust-check-external-types.yml
    with:
      rust: ${{ inputs.check-external-types-rust }}
      target: ${{ inputs.check-external-types-target }}
      args: ${{ inputs.check-external-types-args }}

  clippy:
    needs: prepare
    if: inputs.clippy && needs.prepare.outputs.rust == 'true'
    uses: ./.github/workflows/rust-clippy.yml
    with:
      rust: ${{ inputs.rust }}
      target: ${{ inputs.clippy-target }}
      args: ${{ inputs.clippy-args }}
      doctest: ${{ inputs.clippy-doctest }}
      unqualified_local_imports: ${{ inputs.unqualified_local_imports }}
      implicit_provenance_casts: ${{ inputs.implicit_provenance_casts }}

  codeql:
    name: codeql (${{ matrix.language }})
    needs: prepare
    # codeql-action pins default CodeQL bundle version, so the value of running it is limited if
    # there are no code changes.
    if: inputs.codeql && github.event_name != 'schedule'
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.codeql-matrix) }}
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-24.04' }}
    timeout-minutes: 60
    permissions:
      security-events: write # for github/codeql-action/*
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2
      - uses: taiki-e/install-action@b8cecb83565409bcc297b2df6e77f030b2a468d5 # v2.82.0
        with:
          tool: rust@${{ inputs.rust }}
          fallback: none
        if: matrix.language == 'rust'
      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: /language:${{ matrix.language }}

  codegen:
    needs: prepare
    if: inputs.codegen && needs.prepare.outputs.codegen == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2
      - uses: taiki-e/github-actions/free-device-space@daf550b807efeb6fcd612a0743fe0803f313f4aa # main # zizmor: ignore[stale-action-refs]
        if: inputs.codegen-free-device-space
      - uses: taiki-e/install-action@b8cecb83565409bcc297b2df6e77f030b2a468d5 # v2.82.0
        with:
          tool: rust@${{ inputs.rust }}
          fallback: none
        if: needs.prepare.outputs.rust == 'true'
      - run: bash "${SCRIPT}"
        env:
          SCRIPT: tools/gen.sh
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: git add -N . && git -c color.ui=always diff --exit-code

  docs:
    needs: prepare
    if: inputs.docs && (needs.prepare.outputs.rust-pub-lib == 'true' || needs.prepare.outputs.rust-pub-proc-macro == 'true')
    uses: ./.github/workflows/rust-docs.yml
    with:
      rust: ${{ inputs.rust }}
      target: ${{ inputs.docs-target }}
      args: ${{ inputs.docs-args }}
