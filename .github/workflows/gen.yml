# Run code generator and open PR if new change available.
#
# There is no stability guarantee for this workflow, since it's supposed to only be
# used in infra managed by us.
#
# tidy.yml has similar version of this that doesn't open a PR.
#
# Usage:
#
# ```yaml
#   gen:
#     uses: taiki-e/github-actions/.github/workflows/gen.yml@main
#     permissions:
#       contents: write # for creating branch for pr
#     secrets:
#       PR_TOKEN_APP_PRIVATE_KEY: ${{ secrets.PR_TOKEN_APP_PRIVATE_KEY }}
# ```
#
# See "on.workflow_call.inputs" below for input options.

permissions: {}

on:
  workflow_call:
    inputs:
      script:
        required: false
        type: string
        default: tools/gen.sh
      commit-script:
        required: false
        type: string
        default: tools/ci/gen.sh
      title:
        required: false
        type: string
        default: Update generated code
      branch:
        required: false
        type: string
        default: update-generated-code
      free-device-space:
        required: false
        type: boolean
        default: false
      install-rust:
        required: false
        type: boolean
        default: false
      rust:
        required: false
        type: string
        default: nightly
      install-cosign:
        required: false
        type: boolean
        default: false
      install-parse-changelog:
        required: false
        type: boolean
        default: false
      pr-token-app-client-id:
        required: false
        type: string
        default: Iv23liTXn5nJSj4JzqMb # https://github.com/apps/taiki-e-automated-pr
    secrets:
      PR_TOKEN_APP_PRIVATE_KEY:
        required: false

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_GIT_FETCH_WITH_CLI: true
  CARGO_NET_RETRY: 10
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: -D warnings
  RUSTDOCFLAGS: -D warnings
  RUSTUP_MAX_RETRIES: 10
  # Reusable workflows cannot inherit environment variables.
  ATOMIC_MAYBE_UNINIT_DENY_WARNINGS: 1
  CARGO_HACK_DENY_WARNINGS: 1
  CARGO_LLVM_COV_DENY_WARNINGS: 1
  CARGO_MINIMAL_VERSIONS_DENY_WARNINGS: 1
  CARGO_NO_DEV_DEPS_DENY_WARNINGS: 1
  CONST_FN_DENY_WARNINGS: 1
  PORTABLE_ATOMIC_DENY_WARNINGS: 1
  SEMIHOSTING_DENY_WARNINGS: 1

defaults:
  run:
    shell: bash --noprofile --norc -CeEuo pipefail {0}

jobs:
  gen:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: write # for creating branch for pr / gh pr merge --rebase --auto
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2
      - name: Prepare
        id: prepare
        run: |
          IFS=$'\n\t'
          trap -- 's=$?; printf >&2 "%s\n" "${0##*/}:${LINENO}: \`${BASH_COMMAND}\` exit with ${s}"; exit ${s}' ERR
          if [[ -n "$(git ls-files '*.rs')" ]]; then
            printf 'rust=true\n' >>"${GITHUB_OUTPUT}"
          fi
          if [[ -e "${COMMIT_SCRIPT}" ]]; then
            printf 'commit=true\n' >>"${GITHUB_OUTPUT}"
          fi
        env:
          COMMIT_SCRIPT: ${{ inputs.commit-script }}
      - uses: taiki-e/github-actions/free-device-space@daf550b807efeb6fcd612a0743fe0803f313f4aa # main # zizmor: ignore[stale-action-refs]
        if: inputs.free-device-space
      - uses: taiki-e/install-action@e3134ec54b36203e18f2d1e80652058bd078dd91 # v2.77.3
        with:
          tool: rust@${{ inputs.rust }}
          fallback: none
        if: inputs.install-rust || steps.prepare.outputs.rust == 'true'
      - uses: taiki-e/install-action@e3134ec54b36203e18f2d1e80652058bd078dd91 # v2.77.3
        with:
          tool: cosign
          fallback: none
        if: inputs.install-cosign
      - uses: taiki-e/install-action@e3134ec54b36203e18f2d1e80652058bd078dd91 # v2.77.3
        with:
          tool: parse-changelog
          fallback: none
        if: inputs.install-parse-changelog
      - run: bash "${SCRIPT}"
        env:
          SCRIPT: ${{ inputs.script }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Handle diff
        id: diff
        run: bash "${COMMIT_SCRIPT}"
        env:
          COMMIT_SCRIPT: ${{ inputs.commit-script }}
        if: steps.prepare.outputs.commit == 'true' && github.repository_owner == 'taiki-e' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event_name == 'push' && github.ref == 'refs/heads/main')
      - run: git add -N . && git -c color.ui=always diff --exit-code
      - uses: taiki-e/github-actions/push@daf550b807efeb6fcd612a0743fe0803f313f4aa # main # zizmor: ignore[stale-action-refs]
        with:
          ref: refs/heads/${{ inputs.branch }}
          force: true
        if: steps.prepare.outputs.commit == 'true' && github.repository_owner == 'taiki-e' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event_name == 'push' && github.ref == 'refs/heads/main') && steps.diff.outputs.success == 'false'
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: pr-token
        with:
          client-id: ${{ inputs.pr-token-app-client-id }}
          private-key: ${{ secrets.PR_TOKEN_APP_PRIVATE_KEY }} # zizmor: ignore[secrets-outside-env] # TODO
        if: steps.prepare.outputs.commit == 'true' && github.repository_owner == 'taiki-e' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event_name == 'push' && github.ref == 'refs/heads/main') && steps.diff.outputs.success == 'false'
      - name: Create or re-open PR
        run: |
          if ! gh pr create --head taiki-e:"${BRANCH:?}" --title "${TITLE:?}" --body "${BODY}" 2>&1 | tee -- /tmp/create.log; then
            if grep -Eq 'pull request.* already exists' /tmp/create.log; then
              # close and re-open if already exists because token used to push cannot trigger workflow
              gh pr close "${BRANCH}"
              gh pr reopen "${BRANCH}"
            else
              exit 1
            fi
          fi
          rm -- /tmp/create.log
        env:
          TITLE: ${{ inputs.title }}
          BODY: |
            Auto-generated by CI.
          BRANCH: ${{ inputs.branch }}
          # Note that if we use secrets.GITHUB_TOKEN, the opened PR cannot trigger workflows.
          GITHUB_TOKEN: ${{ steps.pr-token.outputs.token }} # zizmor: ignore[secrets-outside-env] # TODO
        if: steps.prepare.outputs.commit == 'true' && github.repository_owner == 'taiki-e' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event_name == 'push' && github.ref == 'refs/heads/main') && steps.diff.outputs.success == 'false'
