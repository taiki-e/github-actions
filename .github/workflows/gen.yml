# Run code generator and open PR if new change available.
#
# There is no stability guarantee for this workflow, since it's supposed to only be
# used in infra managed by us.
#
# Note: We also call this workflow from tidy.yml.
#
# Usage:
#
# ```yaml
#   gen:
#     uses: taiki-e/github-actions/.github/workflows/gen.yml@main
#     permissions:
#       contents: write # for creating branch for pr
#       pull-requests: write # unused (used in `automerge: true` case)
#     secrets:
#       PR_TOKEN_APP_PRIVATE_KEY: ${{ secrets.PR_TOKEN_APP_PRIVATE_KEY }}
# ```
#
# ```yaml
#   gen:
#     uses: taiki-e/github-actions/.github/workflows/gen.yml@main
#     permissions:
#       contents: write # for creating branch for pr
#       pull-requests: write # for gh pr review --approve
#     secrets:
#       PR_TOKEN_APP_PRIVATE_KEY: ${{ secrets.PR_TOKEN_APP_PRIVATE_KEY }}
#     with:
#       automerge: true
# ```
#
# See "on.workflow_call.inputs" below for input options.

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      script:
        required: false
        type: string
        default: tools/gen.sh
      commit-script:
        required: false
        type: string
        default: tools/ci/gen.sh
      title:
        required: false
        type: string
        default: Update generated code
      branch:
        required: false
        type: string
        default: update-generated-code
      automerge:
        required: false
        type: boolean
        default: false
      free-device-space:
        required: false
        type: boolean
        default: false
      install-rust:
        required: false
        type: boolean
        default: false
      rust:
        required: false
        type: string
        default: nightly
    secrets:
      PR_TOKEN_APP_PRIVATE_KEY:
        required: false

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_GIT_FETCH_WITH_CLI: true
  CARGO_NET_RETRY: 10
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: -D warnings
  RUSTDOCFLAGS: -D warnings
  RUSTUP_MAX_RETRIES: 10
  # Reusable workflows cannot inherit environment variables.
  ATOMIC_MAYBE_UNINIT_DENY_WARNINGS: 1
  CARGO_HACK_DENY_WARNINGS: 1
  CARGO_LLVM_COV_DENY_WARNINGS: 1
  CARGO_MINIMAL_VERSIONS_DENY_WARNINGS: 1
  CARGO_NO_DEV_DEPS_DENY_WARNINGS: 1
  CONST_FN_DENY_WARNINGS: 1
  PORTABLE_ATOMIC_DENY_WARNINGS: 1
  SEMIHOSTING_DENY_WARNINGS: 1

defaults:
  run:
    shell: bash --noprofile --norc -CeEuo pipefail {0}

jobs:
  gen:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write # for creating branch for pr / gh pr merge --rebase --auto
      pull-requests: write # for gh pr review --approve / gh pr merge --rebase --auto
    steps:
      - uses: taiki-e/checkout-action@v1
      - uses: taiki-e/github-actions/free-device-space@main
        if: inputs.free-device-space
      - uses: taiki-e/github-actions/install-rust@main
        with:
          toolchain: ${{ inputs.rust }}
        if: inputs.install-rust
      - id: run
        run: |
          bash "${SCRIPT}"
          if [[ -e "${COMMIT_SCRIPT}" ]]; then
            printf 'commit=true\n' >>"${GITHUB_OUTPUT}"
          fi
        env:
          SCRIPT: ${{ inputs.script }}
          COMMIT_SCRIPT: ${{ inputs.commit-script }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Handle diff
        id: diff
        run: bash "${COMMIT_SCRIPT}"
        env:
          COMMIT_SCRIPT: ${{ inputs.commit-script }}
        if: (inputs.automerge || steps.run.outputs.commit == 'true') && github.repository_owner == 'taiki-e' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event_name == 'push' && github.ref == 'refs/heads/main')
      - run: git add -N . && git -c color.ui=always diff --exit-code
      - name: Prepare or update PR
        id: push
        run: |
          IFS=$'\n\t'
          trap -- 's=$?; printf >&2 "%s\n" "${0##*/}:${LINENO}: \`${BASH_COMMAND}\` exit with ${s}"; exit ${s}' ERR
          retry() {
            for i in {1..10}; do
              if "$@"; then
                return 0
              else
                sleep "${i}"
              fi
            done
            "$@"
          }

          prev_credential_helper=$(git config get --local credential.helper || true)
          if [[ -n "${prev_credential_helper}" ]]; then
            printf 'credential helper is already set (%s)\n' "${prev_credential_helper}"
          else
            protocol="${GITHUB_SERVER_URL%%://*}"
            hostname="${GITHUB_SERVER_URL#*://}"
            (
              set -x
              git config --local credential.helper cache
            )
            git credential approve <<EOF
          protocol=${protocol}
          host=${hostname}
          username=${GITHUB_ACTOR}
          password=${PUSH_TOKEN}
          EOF
            # Remove credential helper config on exit.
            trap -- '(set -x; git credential-cache exit; git config --local --unset credential.helper || true)' EXIT
          fi

          (
            set -x
            git checkout -b "${BRANCH:?}"
            retry git push origin -f refs/heads/"${BRANCH}"
          )
        env:
          BRANCH: ${{ inputs.branch }}
          PUSH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: (inputs.automerge || steps.run.outputs.commit == 'true') && github.repository_owner == 'taiki-e' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event_name == 'push' && github.ref == 'refs/heads/main') && steps.diff.outputs.success == 'false'
      - uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        id: pr-token
        with:
          app-id: Iv23liTXn5nJSj4JzqMb # https://github.com/apps/taiki-e-automated-pr
          private-key: ${{ secrets.PR_TOKEN_APP_PRIVATE_KEY }} # zizmor: ignore[secrets-outside-env] # TODO
        if: (inputs.automerge || steps.run.outputs.commit == 'true') && github.repository_owner == 'taiki-e' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event_name == 'push' && github.ref == 'refs/heads/main') && steps.diff.outputs.success == 'false'
      - name: Create or re-open PR
        run: |
          if ! gh pr create --title "${TITLE:?}" --body "${BODY}" 2>&1 | tee -- /tmp/create.log; then
            if grep -Eq 'pull request for branch ".*" into branch ".*" already exists' /tmp/create.log; then
              # close and re-open if already exists because token used to push cannot trigger workflow
              gh pr close "${BRANCH:?}"
              gh pr reopen "${BRANCH}"
            else
              exit 1
            fi
          fi
          rm -- /tmp/create.log
        env:
          TITLE: ${{ inputs.title }}
          BODY: |
            Auto-generated by CI.

            ${{ inputs.automerge && 'This will be auto-merged when CI has passed because this is an auto-generated PR in a defined format and is usually considered no additional review is required.' || '' }}
          BRANCH: ${{ inputs.branch }}
          # Note that if we use secrets.GITHUB_TOKEN, the opened PR cannot trigger workflows.
          GITHUB_TOKEN: ${{ steps.pr-token.outputs.token }} # zizmor: ignore[secrets-outside-env] # TODO
        if: (inputs.automerge || steps.run.outputs.commit == 'true') && github.repository_owner == 'taiki-e' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event_name == 'push' && github.ref == 'refs/heads/main') && steps.diff.outputs.success == 'false'
      - name: Enable auto-merge and approve for auto-generated PR
        run: |
          gh pr merge --rebase --auto "${BRANCH}"
          gh pr review --approve "${BRANCH}"
        env:
          BRANCH: ${{ inputs.branch }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: inputs.automerge && github.repository_owner == 'taiki-e' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event_name == 'push' && github.ref == 'refs/heads/main') && steps.diff.outputs.success == 'false'
