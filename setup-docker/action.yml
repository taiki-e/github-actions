name: setup-docker
description: GitHub Action for setup docker.

inputs:
  buildx:
    description: Set up buildx
    required: false
    default: 'true'
  qemu:
    description: Set up QEMU
    required: false
    default: 'arm64'

# Note:
# - inputs.* should be manually mapped to INPUT_* due to https://github.com/actions/runner/issues/665
# - For context containing path, use GITHUB_*/RUNNER_* instead of github.*/runner.* due to https://github.com/actions/runner/issues/2185
runs:
  using: composite
  steps:
    - run: bash --noprofile --norc "${GITHUB_ACTION_PATH:?}/main.sh"
      shell: bash
      env:
        INPUT_BUILDX: ${{ inputs.buildx }}
        INPUT_QEMU: ${{ inputs.qemu }}
