# Run various checks.
#
# There is no stability guarantee for this workflow, since it's supposed to only be
# used in infra managed by us.
#
# Usage:
#
# ```yml
#   tidy:
#     uses: taiki-e/github-actions/.github/workflows/tidy.yml@main
# ```
#
# See "on.workflow_call.inputs" below for input options.

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      rust:
        required: false
        type: string
        default: nightly
      clippy:
        required: false
        type: boolean
        default: true
      clippy-target:
        required: false
        type: string
      clippy-args:
        required: false
        type: string
      clippy-doctest:
        required: false
        type: boolean
        default: true
      unqualified_local_imports:
        required: false
        type: boolean
        default: true
      fuzzy_provenance_casts:
        required: false
        type: boolean
        default: true
      check-external-types:
        required: false
        type: boolean
        default: true
      check-external-types-rust:
        required: false
        type: string
        default: nightly-2025-10-18
      check-external-types-target:
        required: false
        type: string
      check-external-types-args:
        required: false
        type: string
      deny:
        required: false
        type: boolean
        default: true
      deny-args:
        required: false
        type: string
      docs:
        required: false
        type: boolean
        default: true
      docs-target:
        required: false
        type: string
      docs-args:
        required: false
        type: string
      codeql:
        required: false
        type: boolean
        default: true
      codegen:
        required: false
        type: boolean
        default: true
      codegen-automerge:
        required: false
        type: boolean
        default: false
      codegen-free-device-space:
        required: false
        type: boolean
        default: false
      codegen-workflow:
        required: false
        type: string
        default: .github/workflows/ci.yml
      codegen-job:
        required: false
        type: string
        default: codegen
      all-immutable-release:
        required: false
        type: boolean
        default: true

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_GIT_FETCH_WITH_CLI: true
  CARGO_NET_RETRY: 10
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: -D warnings
  RUSTDOCFLAGS: -D warnings
  RUSTUP_MAX_RETRIES: 10
  # Reusable workflows cannot inherit environment variables.
  ATOMIC_MAYBE_UNINIT_DENY_WARNINGS: 1
  CARGO_HACK_DENY_WARNINGS: 1
  CARGO_LLVM_COV_DENY_WARNINGS: 1
  CARGO_MINIMAL_VERSIONS_DENY_WARNINGS: 1
  CARGO_NO_DEV_DEPS_DENY_WARNINGS: 1
  CONST_FN_DENY_WARNINGS: 1
  PORTABLE_ATOMIC_DENY_WARNINGS: 1
  SEMIHOSTING_DENY_WARNINGS: 1

defaults:
  run:
    shell: bash --noprofile --norc -CeEuo pipefail {0}

jobs:
  prepare:
    runs-on: ubuntu-slim
    timeout-minutes: 15 # Max execution time of ubuntu-slim runner.
    steps:
      - uses: taiki-e/checkout-action@v1
      - name: Prepare
        id: prepare
        run: |
          IFS=$'\n\t'
          trap -- 's=$?; printf >&2 "%s\n" "${0##*/}:${LINENO}: \`${BASH_COMMAND}\` exit with ${s}"; exit ${s}' ERR
          retry() {
            for i in {1..10}; do
              if "$@"; then
                return 0
              else
                sleep "${i}"
              fi
            done
            "$@"
          }
          if [[ -n "$(git ls-files '*.rs')" ]]; then
            printf 'rust=true\n' >>"${GITHUB_OUTPUT}"
            if ! type -P rustup; then
              retry curl --proto '=https' --tlsv1.2 -fsSL --retry 10 -o rustup-init https://sh.rustup.rs
              chmod +x ./rustup-init
              retry ./rustup-init -y --default-toolchain "${INPUT_RUST}" --no-modify-path --profile minimal
              rm -- ./rustup-init
              export PATH="${HOME}/.cargo/bin:${PATH}"
            fi
            metadata=$(cargo metadata --format-version=1 --no-deps)
            # Publishing is unrestricted if null, and forbidden if an empty array.
            if [[ -n "$(jq -c '. as $metadata | .workspace_members[] as $id | $metadata.packages[] | select(.id == $id and .publish != [])' <<<"${metadata}")" ]]; then
              printf 'rust-pub=true\n' >>"${GITHUB_OUTPUT}"
              if [[ -n "$(jq -c '. as $metadata | .workspace_members[] as $id | $metadata.packages[] | select(.id == $id and .publish != [] and .targets[].kind[] == "lib")' <<<"${metadata}")" ]]; then
                printf 'rust-pub-lib=true\n' >>"${GITHUB_OUTPUT}"
              fi
              if [[ -n "$(jq -c '. as $metadata | .workspace_members[] as $id | $metadata.packages[] | select(.id == $id and .publish != [] and .targets[].kind[] == "proc-macro")' <<<"${metadata}")" ]]; then
                printf 'rust-pub-proc-macro=true\n' >>"${GITHUB_OUTPUT}"
              fi
            fi
          fi
          if [[ -n "$(git ls-files '*Dockerfile*')" ]]; then
            printf 'dockerfile=true\n' >>"${GITHUB_OUTPUT}"
          fi
          if [[ -e tools/gen.sh ]]; then
            job=$(pipx run yq -c ".jobs.\"${INPUT_CODEGEN_JOB}\"" "${INPUT_CODEGEN_WORKFLOW}")
            if [[ "${job}" == "null" ]]; then
              printf 'codegen=true\n' >>"${GITHUB_OUTPUT}"
            fi
          elif [[ -e tools/ci/gen.sh ]]; then
            printf '%s\n' "::error::tools/ci/gen.sh is available but tools/gen.sh is not available"
            exit 1
          fi
        env:
          INPUT_RUST: ${{ inputs.rust }}
          INPUT_CODEGEN_JOB: ${{ inputs.codegen-job }}
          INPUT_CODEGEN_WORKFLOW: ${{ inputs.codegen-workflow }}
    outputs:
      rust: ${{ steps.prepare.outputs.rust }}
      rust-pub: ${{ steps.prepare.outputs.rust-pub }}
      rust-pub-lib: ${{ steps.prepare.outputs.rust-pub-lib }}
      rust-pub-proc-macro: ${{ steps.prepare.outputs.rust-pub-proc-macro }}
      dockerfile: ${{ steps.prepare.outputs.dockerfile }}
      codegen: ${{ steps.prepare.outputs.codegen }}

  tidy:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write # for creating branch for pr
    steps:
      - uses: taiki-e/checkout-action@v1
      - uses: taiki-e/github-actions/install-rust@main
        with:
          toolchain: ${{ inputs.rust }}
          component: rustfmt
        if: needs.prepare.outputs.rust == 'true'
      - uses: taiki-e/install-action@v2
        with:
          tool: shellcheck,shfmt,zizmor${{ needs.prepare.outputs.dockerfile == 'true' && ',parse-dockerfile' || '' }}
          fallback: none
      - run: cat -- tools/.tidy-check-license-headers
      - run: cat -- .cspell.json
      - run: printf 'REMOVE_UNUSED_WORDS=1\n' >>"${GITHUB_ENV}"
        if: github.repository_owner == 'taiki-e' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event_name == 'push' && github.ref == 'refs/heads/main')
      - run: tools/tidy.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Check ruleset
        run: |
          ruleset=$(gh ruleset list)
          grep -Eq 'Additional branch protection for non-admin roles\b.*\bactive' <<<"${ruleset}"
          grep -Eq 'Branch protection for all roles\b.*\bactive' <<<"${ruleset}"
          grep -Eq 'Tag protection for all roles\b.*\bactive' <<<"${ruleset}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: github.repository_owner == 'taiki-e'
      - name: Check release immutability
        run: |
          retry() {
            for i in {1..10}; do
              if "$@"; then
                return 0
              else
                sleep "${i}"
              fi
            done
            "$@"
          }
          page=1
          not_immutable=''
          while true; do
            set +x
            releases=$(
              retry curl --proto '=https' --tlsv1.2 -fsSL --retry 10 \
                -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                -H 'Accept: application/vnd.github+json' \
                -H 'X-GitHub-Api-Version: 2022-11-28' \
                "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases?per_page=100&page=${page}"
            )
            set -x
            t=$(jq -r '.[] | select(.immutable == false) | .tag_name' <<<"${releases}")
            if [[ -n "${t}" ]]; then
              not_immutable+="${t}"$'\n'
            fi
            len=$(jq '. | length' <<<"${releases}")
            if [[ "${len}" -lt 100 ]]; then
              break
            fi
            _=$((page++))
          done
          if [[ -n "${not_immutable}" ]]; then
            printf '%s\n%s' "::error::non-immutable releases found" "${not_immutable}"
            exit 1
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: inputs.all-immutable-release && github.repository_owner == 'taiki-e'
      - run: |
          [[ ! -f tools/cspell-dict.sh ]] || tools/cspell-dict.sh clean
      - name: Handle diff
        id: diff
        run: |
          git config user.name 'Taiki Endo'
          git config user.email 'te316e89@gmail.com'
          git add -N .github/.cspell
          if ! git diff --exit-code -- .github/.cspell &>/dev/null; then
            git add .github/.cspell
            git commit -m "Update cspell dictionary"
            printf 'success=false\n' >>"${GITHUB_OUTPUT}"
          fi
        if: github.repository_owner == 'taiki-e' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event_name == 'push' && github.ref == 'refs/heads/main')
      - run: git add -N . && git -c color.ui=always diff --exit-code
      - uses: actions/create-github-app-token@v2
        id: pr-token
        with:
          app-id: Iv23liTXn5nJSj4JzqMb # https://github.com/apps/taiki-e-automated-pr
          private-key: ${{ secrets.PR_TOKEN_APP_PRIVATE_KEY }} # zizmor: ignore[secrets-outside-env] # TODO
        if: github.repository_owner == 'taiki-e' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event_name == 'push' && github.ref == 'refs/heads/main') && steps.diff.outputs.success == 'false'
      - name: Create PR
        id: create-pull-request
        uses: peter-evans/create-pull-request@v8
        with:
          title: Update cspell dictionary
          body: |
            Auto-generated by CI using [create-pull-request](https://github.com/peter-evans/create-pull-request).
          branch: update-cspell-dictionary
          # Note that if we use secrets.GITHUB_TOKEN, the opened PR cannot trigger workflows.
          token: ${{ steps.pr-token.outputs.token }} # zizmor: ignore[secrets-outside-env] # TODO
          branch-token: ${{ secrets.GITHUB_TOKEN }}
        if: github.repository_owner == 'taiki-e' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event_name == 'push' && github.ref == 'refs/heads/main') && steps.diff.outputs.success == 'false'

  clippy:
    needs: prepare
    if: inputs.clippy && needs.prepare.outputs.rust == 'true'
    uses: ./.github/workflows/clippy.yml
    with:
      rust: ${{ inputs.rust }}
      target: ${{ inputs.clippy-target }}
      args: ${{ inputs.clippy-args }}
      doctest: ${{ inputs.clippy-doctest }}
      unqualified_local_imports: ${{ inputs.unqualified_local_imports }}
      fuzzy_provenance_casts: ${{ inputs.fuzzy_provenance_casts }}

  check-external-types:
    needs: prepare
    if: inputs.check-external-types && needs.prepare.outputs.rust-pub-lib == 'true'
    uses: ./.github/workflows/check-external-types.yml
    with:
      rust: ${{ inputs.check-external-types-rust }}
      target: ${{ inputs.check-external-types-target }}
      args: ${{ inputs.check-external-types-args }}

  deny:
    needs: prepare
    if: inputs.deny && needs.prepare.outputs.rust-pub == 'true'
    uses: ./.github/workflows/deny.yml
    with:
      rust: ${{ inputs.rust }}
      args: ${{ inputs.deny-args }}

  docs:
    needs: prepare
    if: inputs.docs && (needs.prepare.outputs.rust-pub-lib == 'true' || needs.prepare.outputs.rust-pub-proc-macro == 'true')
    uses: ./.github/workflows/docs.yml
    with:
      rust: ${{ inputs.rust }}
      target: ${{ inputs.docs-target }}
      args: ${{ inputs.docs-args }}

  codeql:
    needs: prepare
    if: inputs.codeql
    uses: ./.github/workflows/codeql.yml
    permissions:
      contents: read
      security-events: write # for github/codeql-action/*
    with:
      rust: ${{ inputs.rust }}

  codegen:
    needs: prepare
    if: inputs.codegen && needs.prepare.outputs.codegen == 'true'
    uses: ./.github/workflows/gen.yml
    permissions:
      contents: write # for creating branch for pr
      pull-requests: write # for gh pr review --approve
    secrets: inherit
    with:
      automerge: ${{ inputs.codegen-automerge }}
      free-device-space: ${{ inputs.codegen-free-device-space }}
      install-rust: ${{ needs.prepare.outputs.rust == 'true' }}
